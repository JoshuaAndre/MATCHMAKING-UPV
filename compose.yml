services:
  postgres:
    image: postgres:16
    container_name: matchmaking-postgres
    environment:
      POSTGRES_USER: matchmaking
      POSTGRES_PASSWORD: matchmaking
      POSTGRES_DB: matchmaking_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matchmaking -d matchmaking_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  player-service:
    build: ./services/player-service
    container_name: player-service
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://matchmaking:matchmaking@postgres:5432/matchmaking_db
    depends_on:
      postgres:
        condition: service_healthy

  matchmaking-service:
    build: ./services/matchmaking-service
    container_name: matchmaking-service
    ports:
      - "8001:8000"
    environment:
      - MATCH_SERVICE_URL=http://match-service:8000
    depends_on:
      - match-service

  rating-service:
    build: ./services/rating-service
    container_name: rating-service
    ports:
      - "8002:8000"

  match-service:
    build: ./services/match-service
    container_name: match-service
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=postgresql://matchmaking:matchmaking@postgres:5432/matchmaking_db
      - RATING_SERVICE_URL=http://rating-service:8000
      - PLAYER_SERVICE_URL=http://player-service:8000
    depends_on:
      postgres:
        condition: service_healthy
      rating-service:
        condition: service_started
      player-service:
        condition: service_started

volumes:
  postgres_data: